<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    width: 320px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    width: 100%;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}
</style>
</head>

<body>

<div class="box">
    <h2>👔 Teacher Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button>Login</button>
    </form>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
