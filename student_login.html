<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>
body {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    border: none;
    background: #ff6b6b;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="box">
    <h2>🎓 Student Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button>Login 🚀</button>
    </form>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
